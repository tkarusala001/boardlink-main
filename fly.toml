app = "boardlink"
primary_region = "ewr"

[build]
  dockerfile = "Dockerfile"

[[services]]
  internal_port = 8082
  protocol = "tcp"
  # Enable HTTP(s) routing (optional, can be removed if you only need raw WS)
  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443
  [[services.ports]]
    handlers = ["http"]
    port = 80
